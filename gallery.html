<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

  <button class="lb-btn lb-close" id="lbClose">×</button>
  <button class="lb-btn lb-prev" id="lbPrev">‹</button>

  <figure class="lb-figure">
    <img id="lbImg">
    <figcaption id="lbCaption"></figcaption>
  </figure>

  <button class="lb-btn lb-next" id="lbNext">›</button>

</div>


<script>

const tiles = Array.from(document.querySelectorAll('.tile'));
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCaption = document.getElementById('lbCaption');
const lbClose = document.getElementById('lbClose');
const lbPrev = document.getElementById('lbPrev');
const lbNext = document.getElementById('lbNext');

let currentIndex = 0;

function openLightbox(index){
  currentIndex = index;

  const tile = tiles[currentIndex];
  const full = tile.dataset.full;
  const caption = tile.dataset.caption;

  lbImg.src = full;
  lbCaption.textContent = caption;

  lightbox.classList.add("is-open");
  document.body.style.overflow = "hidden";
}

function closeLightbox(){
  lightbox.classList.remove("is-open");
  lbImg.src = "";
  document.body.style.overflow = "";
}

function showNext(step){
  const next = (currentIndex + step + tiles.length) % tiles.length;
  openLightbox(next);
}

tiles.forEach((tile, i)=>{
  tile.addEventListener("click", e=>{
    e.preventDefault();
    openLightbox(i);
  });
});

lbClose.addEventListener("click", closeLightbox);
lbPrev.addEventListener("click", ()=>showNext(-1));
lbNext.addEventListener("click", ()=>showNext(1));

lightbox.addEventListener("click", e=>{
  if(e.target === lightbox){
    closeLightbox();
  }
});

document.addEventListener("keydown", e=>{
  if(!lightbox.classList.contains("is-open")) return;

  if(e.key === "Escape") closeLightbox();
  if(e.key === "ArrowRight") showNext(1);
  if(e.key === "ArrowLeft") showNext(-1);
});

</script>

</body>
